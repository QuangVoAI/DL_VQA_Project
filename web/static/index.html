<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>VQA System - Predict & Compare</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0071e3",
                        "primary-content": "#ffffff",
                        "background-light": "#f5f5f7",
                        "background-dark": "#1d1d1f",
                        "surface-light": "#ffffff",
                        "surface-dark": "#000000",
                        "border-light": "#e5e7eb",
                        "border-dark": "#2d3748",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "body": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "2xl": "2rem",
                        "full": "9999px"
                    },
                    boxShadow: {
                        "soft": "0 2px 10px rgba(0, 0, 0, 0.03)",
                        "card": "0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px -1px rgba(0, 0, 0, 0.02)"
                    }
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .dark .glass-panel { background: rgba(28, 38, 50, 0.8); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Hiệu ứng con trỏ nhấp nháy cho Typewriter */
        .typing-cursor::after {
            content: '|';
            display: inline-block;
            animation: blink 0.8s step-end infinite;
            color: #0071e3;
            margin-left: 2px;
            font-weight: 300;
        }
        @keyframes blink {
            from, to { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Ẩn nội dung khi mới load để đợi hiệu ứng */
        .wait-for-intro {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease-out, transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }
        .intro-done {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col font-body text-slate-900 dark:text-slate-100 antialiased selection:bg-primary/20 selection:text-primary transition-colors duration-200">

    <header class="sticky top-0 z-50 w-full border-b border-slate-200 dark:border-slate-800 glass-panel">
        <div class="max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex h-16 items-center justify-between">
                <div class="flex items-center gap-3 cursor-pointer hover:opacity-80 transition-opacity">
                    <div class="flex h-9 w-9 items-center justify-center rounded-lg bg-gradient-to-br from-primary to-blue-500 text-white shadow-sm">
                        <span class="material-symbols-outlined text-[20px]">graphic_eq</span>
                    </div>
                    <span class="text-lg font-bold tracking-tight text-slate-900 dark:text-white">VQA Research</span>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 w-full max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8 py-10 space-y-16">
        
        <section class="flex flex-col items-center">
            <div class="text-center max-w-3xl mx-auto mb-10 min-h-[140px] flex flex-col items-center justify-center">
                <h1 id="animated-title" class="whitespace-pre-wrap text-[40px] md:text-[52px] font-extrabold leading-[1.05] tracking-tight mb-4 text-slate-900 dark:text-white min-h-[60px]"></h1>
                <p id="animated-subtitle" class="whitespace-pre-wrap text-slate-500 dark:text-slate-400 text-lg md:text-[21px] font-medium leading-relaxed max-w-2xl mx-auto min-h-[60px]"></p>
            </div>

            <form id="vqa-form" class="wait-for-intro w-full max-w-[1000px] bg-surface-light dark:bg-[#151516] rounded-[1.5rem] shadow-[0_4px_24px_rgba(0,0,0,0.04)] border border-slate-200/80 dark:border-slate-800 overflow-hidden flex flex-col md:flex-row">
                
                <div class="w-full md:w-1/2 p-8 flex flex-col border-b md:border-b-0 md:border-r border-slate-100 dark:border-slate-800 bg-slate-50/50 dark:bg-transparent">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-[19px] font-semibold tracking-tight text-slate-900 dark:text-white">Source Image</h3>
                    </div>
                    
                    <label class="relative group w-full flex-1 min-h-[250px] bg-white dark:bg-slate-900/50 rounded-2xl overflow-hidden border border-dashed border-slate-300 dark:border-slate-700 flex items-center justify-center transition-colors hover:bg-slate-50 dark:hover:bg-slate-900 cursor-pointer shadow-sm">
                        
                        <div id="preview-placeholder" class="flex flex-col items-center gap-3 z-10 p-6 text-center transition-opacity duration-300 group-hover:opacity-80">
                            <span class="material-symbols-outlined text-slate-400 text-5xl group-hover:text-primary transition-colors">add_photo_alternate</span>
                            <div class="space-y-1">
                                <p class="text-slate-700 dark:text-slate-200 font-medium text-[15px]">Click to upload image</p>
                                <p class="text-slate-400 text-xs uppercase tracking-wider font-semibold">JPG, PNG, WEBP</p>
                            </div>
                        </div>
                        
                        <img id="preview-image" alt="Preview" class="hidden absolute inset-0 w-full h-full object-contain bg-slate-900/5 backdrop-blur-sm z-20" />
                        
                        <input id="image" name="image" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer hidden" type="file" required />
                    </label>
                </div>

                <div class="w-full md:w-1/2 p-8 flex flex-col bg-white dark:bg-[#151516]">
                    <div class="mb-5">
                        <h3 class="text-[19px] font-semibold tracking-tight text-slate-900 dark:text-white mb-1">Ask a Question</h3>
                        <p class="text-slate-500 dark:text-slate-400 text-[14px]">What do you want to know about the image?</p>
                    </div>
                    
                    <div class="flex-1 flex flex-col gap-4">
                        <textarea id="question" required class="w-full flex-1 min-h-[140px] resize-none rounded-2xl border border-slate-200 dark:border-slate-700 bg-slate-50/80 dark:bg-black/20 p-5 text-[17px] text-slate-900 dark:text-white placeholder:text-slate-400 focus:border-primary focus:ring-2 focus:ring-primary/20 focus:outline-none transition-all shadow-inner" placeholder="e.g., What color is the car in the background?"></textarea>
                        
                        <div class="space-y-5 pt-2">
                            <div class="flex items-center gap-3">
                                <span class="text-[11px] font-bold uppercase tracking-widest text-slate-400">Try:</span>
                                <div class="flex gap-2 overflow-x-auto pb-1 no-scrollbar">
                                    <button type="button" onclick="document.getElementById('question').value='What is the person doing?'" class="whitespace-nowrap rounded-full bg-slate-100 dark:bg-slate-800 px-4 py-2 text-[13px] font-semibold text-slate-600 dark:text-slate-300 hover:bg-slate-200 transition-colors">
                                        What is the person doing?
                                    </button>
                                    <button type="button" onclick="document.getElementById('question').value='How many people are there?'" class="whitespace-nowrap rounded-full bg-slate-100 dark:bg-slate-800 px-4 py-2 text-[13px] font-semibold text-slate-600 dark:text-slate-300 hover:bg-slate-200 transition-colors">
                                        How many people?
                                    </button>
                                </div>
                            </div>
                            
                            <button type="submit" id="submit-btn" class="w-full rounded-2xl bg-[#0071e3] hover:bg-[#0077ED] py-4 px-6 text-[17px] font-semibold text-white shadow-md transition-all active:scale-[0.98] flex items-center justify-center gap-2">
                                <span id="submit-label">Run Analysis across Models</span>
                                <span id="submit-spinner" class="hidden h-5 w-5 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
                                <span id="submit-icon" class="material-symbols-outlined text-[20px]">arrow_forward</span>
                            </button>
                            <p id="status-text" class="text-center text-sm font-medium text-slate-500 h-5"></p>
                        </div>
                    </div>
                </div>
            </form>
        </section>

        <section id="results-section" class="wait-for-intro">
            <div class="flex flex-col md:flex-row md:items-end justify-between gap-4 mb-8">
                <div class="space-y-2">
                    <h2 class="text-2xl md:text-[28px] font-bold tracking-tight text-slate-900 dark:text-white">Model Comparisons</h2>
                    <p class="text-slate-500 dark:text-slate-400 text-[15px] max-w-2xl">
                        Review the generated answers and architectural details for each configuration.
                    </p>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <script>
                    const modelsInfo = [
                        {id: "M1_Scratch_NoAttn", badge: "Baseline", title: "Basic CNN-LSTM", sub: "Scratch, No Attention", color: "slate"},
                        {id: "M2_Scratch_Attn", badge: "Spatial Attention", title: "Attention CNN-LSTM", sub: "Scratch, Attention", color: "indigo"},
                        {id: "M3_Pretrained_NoAttn", badge: "Transfer Learning", title: "Pre-trained Vision", sub: "Pretrained, No Attention", color: "amber"},
                        {id: "M4_Pretrained_Attn", badge: "State of the Art", title: "Pre-trained + Attn", sub: "Pretrained, Attention", color: "primary"}
                    ];
                    
                    modelsInfo.forEach(m => {
                        let isBest = m.color === "primary";
                        let ring = isBest ? "border-2 border-[#0071e3]/30 shadow-lg shadow-[#0071e3]/10" : "border border-slate-200 dark:border-slate-800 shadow-sm";
                        let badgeBg = isBest ? "bg-[#0071e3]/10 text-[#0071e3] border-[#0071e3]/20" : `bg-${m.color}-50 text-${m.color}-600 border-${m.color}-100`;
                        
                        document.write(`
                        <div class="flex flex-col bg-white dark:bg-[#151516] rounded-2xl ${ring} overflow-hidden hover:shadow-xl transition-all duration-300 min-h-[220px]">
                            <div class="p-5 border-b border-slate-100 dark:border-slate-800">
                                <div class="mb-3">
                                    <span class="px-3 py-1 text-[11px] font-bold uppercase tracking-wider ${badgeBg} rounded-full border">${m.badge}</span>
                                </div>
                                <h3 class="text-[17px] font-bold text-slate-900 dark:text-white">${m.title}</h3>
                                <p class="text-[13px] font-medium text-slate-500 mt-1">${m.sub}</p>
                            </div>
                            <div class="p-6 bg-slate-50/50 dark:bg-slate-900/20 flex-1 flex flex-col justify-center">
                                <span class="text-[11px] font-bold text-[#0071e3] uppercase tracking-widest mb-2">Prediction</span>
                                <div id="ans-${m.id}" class="text-[17px] font-semibold text-slate-800 dark:text-slate-200 italic text-slate-400">Waiting for input...</div>
                            </div>
                        </div>
                        `);
                    });
                </script>
            </div>
        </section>
    </main>

    <footer class="py-8 border-t border-slate-200 dark:border-slate-800 bg-surface-light dark:bg-[#151516] mt-auto">
        <div class="max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-center items-center gap-4 text-center">
            <p class="text-[13px] font-medium text-slate-500 dark:text-slate-400">
                Contact us: <a href="mailto:523H0178@student.tdtu.edu.vn" class="hover:text-primary transition-colors">523H0178@student.tdtu.edu.vn</a> &amp; <a href="mailto:523H0173@student.tdtu.edu.vn" class="hover:text-primary transition-colors">523H0173@student.tdtu.edu.vn</a>
            </p>
        </div>
    </footer>

    <script>
        // 1. Text Typing Animation Logic
        document.addEventListener("DOMContentLoaded", () => {
            const titleEl = document.getElementById("animated-title");
            const subtitleEl = document.getElementById("animated-subtitle");
            const elementsToReveal = document.querySelectorAll(".wait-for-intro");

            const textTitle = "Visual Question Answering";
            const textSubtitle = "Upload an image, ask a question, and compare real-time inference across our CNN-LSTM architectures.";

            function typeWriter(element, text, speed, callback) {
                let i = 0;
                element.classList.add("typing-cursor"); 
                element.textContent = ""; 
                
                function type() {
                    if (i < text.length) {
                        element.textContent += text.charAt(i);
                        i++;
                        setTimeout(type, speed);
                    } else {
                        element.classList.remove("typing-cursor");
                        if (callback) callback();
                    }
                }
                type();
            }

            setTimeout(() => {
                // Tốc độ gõ Title (40ms)
                typeWriter(titleEl, textTitle, 40, () => {
                    setTimeout(() => {
                        // Tốc độ gõ Subtitle (20ms)
                        typeWriter(subtitleEl, textSubtitle, 20, () => {
                            setTimeout(() => {
                                elementsToReveal.forEach(el => el.classList.add("intro-done"));
                            }, 300);
                        });
                    }, 200);
                });
            }, 300); 
        });

        // 2. VQA Core Logic
        const imageInput = document.getElementById("image");
        const previewImage = document.getElementById("preview-image");
        const previewPlaceholder = document.getElementById("preview-placeholder");
        
        const form = document.getElementById("vqa-form");
        const submitBtn = document.getElementById("submit-btn");
        const submitLabel = document.getElementById("submit-label");
        const submitSpinner = document.getElementById("submit-spinner");
        const submitIcon = document.getElementById("submit-icon");
        const statusText = document.getElementById("status-text");

        imageInput.addEventListener("change", (e) => {
            const file = e.target.files && e.target.files[0];
            if (!file) return;
            const url = URL.createObjectURL(file);
            previewImage.src = url;
            previewImage.classList.remove("hidden");
            previewPlaceholder.classList.add("hidden");
        });

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const question = document.getElementById("question").value.trim();
            const file = imageInput.files && imageInput.files[0];

            if (!question || !file) {
                statusText.textContent = "Please upload an image and ask a question.";
                statusText.classList.add("text-red-500");
                return;
            }

            // Set Loading UI
            submitBtn.disabled = true;
            submitBtn.classList.add("opacity-80", "cursor-wait");
            submitLabel.textContent = "Processing Models...";
            submitIcon.classList.add("hidden");
            submitSpinner.classList.remove("hidden");
            statusText.textContent = "Sending inference request...";
            statusText.classList.remove("text-red-500");

            // Reset UI for Models
            const models = ["M1_Scratch_NoAttn", "M2_Scratch_Attn", "M3_Pretrained_NoAttn", "M4_Pretrained_Attn"];
            models.forEach(model => {
                const el = document.getElementById(`ans-${model}`);
                if(el) {
                    el.innerHTML = `<span class="animate-pulse">Analyzing...</span>`;
                    el.classList.remove("italic", "text-slate-400");
                }
            });

            const formData = new FormData();
            formData.append("question", question);
            formData.append("image", file);

            try {
                const res = await fetch("/v1/predict", {
                    method: "POST",
                    body: formData,
                });
                
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.detail || "Request failed");
                }
                
                const data = await res.json();

                // Cập nhật kết quả Prediction
                models.forEach(model => {
                    const el = document.getElementById(`ans-${model}`);
                    if (el) {
                        const answer = data.answers && data.answers[model];
                        if (answer) {
                            el.textContent = answer;
                            el.classList.add("text-slate-900", "dark:text-white", "not-italic");
                            if(model === "M4_Pretrained_Attn") el.classList.add("text-[#0071e3]");
                        } else {
                            el.textContent = "(No answer)";
                            el.classList.add("text-slate-400", "italic");
                        }
                    }
                });

                statusText.textContent = "Inference completed successfully.";
                statusText.classList.add("text-emerald-500");

                document.getElementById("results-section").scrollIntoView({ behavior: 'smooth', block: 'start' });

            } catch (err) {
                console.error(err);
                statusText.textContent = "Error: " + err.message;
                statusText.classList.add("text-red-500");
                
                models.forEach(model => {
                    const el = document.getElementById(`ans-${model}`);
                    if(el) {
                        el.textContent = "Failed to load.";
                        el.classList.add("text-red-400", "italic");
                    }
                });
            } finally {
                submitBtn.disabled = false;
                submitBtn.classList.remove("opacity-80", "cursor-wait");
                submitLabel.textContent = "Run Analysis across Models";
                submitIcon.classList.remove("hidden");
                submitSpinner.classList.add("hidden");
            }
        });
    </script>
</body>
</html>
