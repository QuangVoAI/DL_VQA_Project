# ═══════════════════════════════════════════════════════════════════
# VQA Project — Default Configuration
# ═══════════════════════════════════════════════════════════════════

seed: 42
device: "auto"          # auto | cuda | mps | cpu
log_dir: "logs"
ckpt_dir: "checkpoints"

# ── Data ──
data:
  hf_id: "HuggingFaceM4/A-OKVQA"
  train_ratio: 0.85                   # 85% train / 15% val from HF train split
  freq_threshold: 2                   # min word frequency for vocabulary
  image_size: 224
  expand_rationales: true             # 3× expansion using all rationales

# ── Model ──
model:
  embed_size: 300                     # GloVe 300d
  hidden_size: 512
  num_layers: 2                       # 2-layer LSTM
  dropout: 0.3
  use_pretrained_cnn: true            # ResNet-18 ImageNet (overridden per variant)
  use_attention: true                 # Bahdanau attention (overridden per variant)

# ── Training ──
train:
  epochs: 20
  batch_size: 64
  learning_rate: 3.0e-4
  label_smoothing: 0.1
  grad_clip: 5.0
  patience: 5                         # early stopping patience
  beam_width: 5
  len_alpha: 0.6                      # Wu et al. 2016 length penalty
  tf_start: 1.0                       # teacher forcing start ratio
  tf_end: 0.5                         # teacher forcing end ratio
  scheduler: "cosine"                 # cosine annealing
  eta_min: 1.0e-6
  num_workers: 0                      # 0 on macOS (PIL pickle issue)
  pin_memory: false                   # false for MPS

# ── Model Variants ──
model_variants:
  M1_Scratch_NoAttn:
    use_pretrained_cnn: false
    use_attention: false
  M2_Scratch_Attn:
    use_pretrained_cnn: false
    use_attention: true
  M3_Pretrained_NoAttn:
    use_pretrained_cnn: true
    use_attention: false
  M4_Pretrained_Attn:
    use_pretrained_cnn: true
    use_attention: true
